<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Vice City Car Game</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            user-select: none;
        }
        h1 {
            margin: 5px 0;
            color: #ff007f;
            text-shadow: 2px 2px #000;
        }
        #score-board {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #00ffcc;
        }
        /* Game Road Area */
        #gameArea {
            width: 300px;
            height: 400px;
            background-color: #333;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 4px solid #ff007f;
            border-radius: 10px;
        }
        /* Road Lines Styling */
        .line {
            width: 10px;
            height: 50px;
            background-color: white;
            position: absolute;
            left: 145px;
        }
        /* Player Car */
        #playerCar {
            width: 40px;
            height: 70px;
            background-color: #ff007f;
            position: absolute;
            bottom: 20px;
            left: 130px;
            border-radius: 5px;
            box-shadow: 0 0 8px #ff007f;
        }
        /* Player Car Windows */
        #playerCar::before {
            content: '';
            position: absolute;
            top: 15px; left: 5px; right: 5px; height: 15px;
            background-color: #00ffcc;
            border-radius: 3px;
        }
        /* Enemy Car */
        #enemyCar {
            width: 40px;
            height: 70px;
            background-color: #00ffcc;
            position: absolute;
            top: -80px;
            left: 50px;
            border-radius: 5px;
            box-shadow: 0 0 8px #00ffcc;
        }
        #enemyCar::before {
            content: '';
            position: absolute;
            top: 40px; left: 5px; right: 5px; height: 15px;
            background-color: #ff007f;
            border-radius: 3px;
        }
        /* Controls for Mobile */
        .controls {
            margin-top: 15px;
        }
        .btn {
            background-color: #ff007f;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:active {
            background-color: #00ffcc;
            color: black;
        }
        #restartBtn {
            display: none;
            background-color: #00ffcc;
            color: black;
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px auto;
            border-radius: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>VICE CITY DRIVER</h1>
    <div id="score-board">Score: <span id="score">0</span></div>

    <div id="gameArea">
        <div class="line" style="top: 0px;" id="line1"></div>
        <div class="line" style="top: 100px;" id="line2"></div>
        <div class="line" style="top: 200px;" id="line3"></div>
        <div class="line" style="top: 300px;" id="line4"></div>
        
        <div id="playerCar"></div>
        <div id="enemyCar"></div>
    </div>

    <button id="restartBtn" onclick="restartGame()">Restart Game</button>

    <div class="controls">
        <button class="btn" id="leftBtn">◀ LEFT</button>
        <button class="btn" id="rightBtn">RIGHT ▶</button>
    </div>

    <script>
        const player = document.getElementById('playerCar');
        const enemy = document.getElementById('enemyCar');
        const scoreElement = document.getElementById('score');
        const restartBtn = document.getElementById('restartBtn');
        
        // Lines
        const l1 = document.getElementById('line1');
        const l2 = document.getElementById('line2');
        const l3 = document.getElementById('line3');
        const l4 = document.getElementById('line4');

        let playerX = 130;
        let enemyX = 50;
        let enemyY = -80;
        let score = 0;
        let speed = 4;
        let gameOver = false;
        let gameInterval;

        // Move Left/Right
        document.getElementById('leftBtn').addEventListener('click', () => {
            if(!gameOver && playerX > 20) { playerX -= 35; player.style.left = playerX + 'px'; }
        });
        
        document.getElementById('rightBtn').addEventListener('click', () => {
            if(!gameOver && playerX < 240) { playerX += 35; player.style.left = playerX + 'px'; }
        });

        // Main Game Loop
        function updateGame() {
            if (gameOver) return;

            // Move Road Lines
            moveLine(l1); moveLine(l2); moveLine(l3); moveLine(l4);

            // Move Enemy Car Down
            enemyY += speed;
            if (enemyY > 400) {
                enemyY = -80;
                // Randomly choose left, middle or right lane
                const lanes = [40, 130, 220];
                enemyX = lanes[Math.floor(Math.random() * lanes.length)];
                enemy.style.left = enemyX + 'px';
                
                score += 10;
                scoreElement.innerText = score;
                if(score % 50 === 0) speed += 1; // Speed increases
            }
            enemy.style.top = enemyY + 'px';

            // Check Collision (Accident)
            if (enemyY + 70 > 310 && enemyY < 380 && enemyX === playerX) {
                gameOver = true;
                clearInterval(gameInterval);
                scoreElement.innerHTML = score + " <span style='color:red;'>- CRASHED! Game Over</span>";
                restartBtn.style.display = 'block';
            }
        }

        function moveLine(line) {
            let top = parseInt(line.style.top);
            if (top >= 400) top = -50;
            line.style.top = (top + speed) + 'px';
        }

        function restartGame() {
            playerX = 130;
            enemyX = 50;
            enemyY = -80;
            score = 0;
            speed = 4;
            gameOver = false;
            player.style.left = playerX + 'px';
            scoreElement.innerText = score;
            restartBtn.style.display = 'none';
            clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 20);
        }

        // Start Game
        gameInterval = setInterval(updateGame, 20);
    </script>

</body>
</html>
